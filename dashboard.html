<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research responses — dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f2ef;
      --surface: #fff;
      --ink: #1c1917;
      --muted: #57534e;
      --border: #e7e5e4;
      --accent: #0d9488;
      --accent-soft: #ccfbf1;
      --bar-1: #0f766e;
      --bar-2: #0369a1;
      --bar-3: #7c3aed;
      --bar-4: #c2410c;
      --radius: 12px;
      --shadow: 0 1px 2px rgba(28, 25, 23, 0.06), 0 4px 12px rgba(28, 25, 23, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      font-size: 15px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    header {
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .grid-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    @media (max-width: 800px) {
      .grid-stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 420px) {
      .grid-stats { grid-template-columns: 1fr; }
    }
    .stat {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .stat .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
    }
    .stat .value {
      font-size: 1.75rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      margin-top: 0.2rem;
      color: var(--ink);
    }
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.75rem;
    }
    @media (max-width: 900px) {
      .panels { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem 1.35rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .panel h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 1rem;
      font-weight: 600;
    }
    .role-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
    }
    .role-row:last-child { margin-bottom: 0; }
    .role-name {
      width: 9.5rem;
      flex-shrink: 0;
      font-size: 0.88rem;
      color: var(--ink);
    }
    .role-track {
      flex: 1;
      height: 10px;
      background: #e7e5e4;
      border-radius: 999px;
      overflow: hidden;
    }
    .role-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.35s ease;
    }
    .role-count {
      width: 2rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
    }
    .bars-scroll {
      max-height: 220px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .wc-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.45rem;
      font-size: 0.82rem;
    }
    .wc-id {
      width: 2.5rem;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 500;
      color: var(--muted);
    }
    .wc-track {
      flex: 1;
      height: 8px;
      background: #e7e5e4;
      border-radius: 999px;
      overflow: hidden;
    }
    .wc-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #14b8a6);
      border-radius: 999px;
    }
    .wc-num {
      width: 2rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .toolbar label {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }
    select, input[type="search"] {
      font: inherit;
      padding: 0.45rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      min-width: 12rem;
    }
    input[type="search"] {
      flex: 1;
      min-width: 200px;
      max-width: 320px;
    }
    .table-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th {
      text-align: left;
      padding: 0.75rem 1rem;
      background: #fafaf9;
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
    }
    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf9; }
    .cell-id {
      font-family: "IBM Plex Mono", monospace;
      font-weight: 500;
      white-space: nowrap;
    }
    .cell-role {
      white-space: nowrap;
      color: var(--muted);
    }
    .cell-response {
      color: var(--ink);
      max-width: 0;
    }
    .cell-meta {
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .empty {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Research responses</h1>
      <p>Open-text survey from <code>demo_responses.csv</code> — word counts match the Python script (split on whitespace).</p>
    </header>

    <div class="grid-stats" id="stats"></div>

    <div class="panels">
      <div class="panel">
        <h2>Responses by role</h2>
        <div id="role-chart"></div>
      </div>
      <div class="panel">
        <h2>Word count by participant</h2>
        <div class="bars-scroll" id="wc-chart"></div>
      </div>
    </div>

    <div class="toolbar">
      <label for="filter-role">Role</label>
      <select id="filter-role" aria-label="Filter by role"></select>
      <label for="search">Search</label>
      <input type="search" id="search" placeholder="Search in responses…" autocomplete="off" />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Role</th>
            <th>Words</th>
            <th>Response</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" hidden>No rows match your filters.</div>
    </div>
  </div>

  <script type="application/json" id="survey-data">
[
  {
    "participant_id": "P01",
    "role": "UX Researcher",
    "response": "I usually start by reviewing whatever documentation exists, but honestly most of the time there isn't much. I end up doing a lot of stakeholder interviews just to figure out what the product is actually supposed to do."
  },
  {
    "participant_id": "P02",
    "role": "UX Designer",
    "response": "The hardest part is getting engineers to understand why we need more than two weeks for discovery. They always want to jump straight to wireframes. I've started framing research as risk reduction and that helps a little."
  },
  {
    "participant_id": "P03",
    "role": "Product Manager",
    "response": "We run two-week sprints and research keeps getting squeezed into the first three days. By the time we have findings, the design decisions are already made. I don't know how to fix that."
  },
  {
    "participant_id": "P04",
    "role": "UX Researcher",
    "response": "Recruiting is always the bottleneck. We spend more time finding participants than actually running sessions. I wish we had a panel we could pull from instead of starting from scratch every time."
  },
  {
    "participant_id": "P05",
    "role": "Content Strategist",
    "response": "Nobody invites me into the research phase. I find out what users said in the readout and by then the IA is already locked. The language problems surface in usability testing three months later."
  },
  {
    "participant_id": "P06",
    "role": "UX Designer",
    "response": "I've started doing five-minute hallway tests with anyone I can find. It's not rigorous but it's faster than waiting for a formal study to get scheduled and approved."
  },
  {
    "participant_id": "P07",
    "role": "UX Researcher",
    "response": "The synthesis step is where we lose people. Everyone attends the sessions but nobody wants to sit through two days of affinity mapping. I've tried doing it async with Miro but participation drops off."
  },
  {
    "participant_id": "P08",
    "role": "Product Manager",
    "response": "My biggest frustration is that research findings don't translate into decisions. We get a deck with quotes and themes and then everyone nods and goes back to doing what they planned to do anyway."
  },
  {
    "participant_id": "P09",
    "role": "UX Designer",
    "response": "I find it really hard to push back when someone senior says they already know what users want. Even when I have data that contradicts them."
  },
  {
    "participant_id": "P10",
    "role": "UX Researcher",
    "response": "Remote sessions have actually improved our geographic diversity. We used to only talk to people in Seattle. Now we regularly include participants from smaller cities and that's changed some of our assumptions."
  },
  {
    "participant_id": "P11",
    "role": "Content Strategist",
    "response": "I've been trying to introduce plain language principles but the legal team always pushes back. They want specific wording that users consistently misread in testing. It's a constant negotiation."
  },
  {
    "participant_id": "P12",
    "role": "Product Manager",
    "response": "We don't have a dedicated researcher on my team so I end up doing interviews myself. I'm not sure I'm doing them well but it's better than not doing them at all."
  },
  {
    "participant_id": "P13",
    "role": "UX Designer",
    "response": "The gap between what users say they do and what they actually do is real. I had a participant tell me they always read the confirmation email and then in the diary study we ran they never opened a single one."
  },
  {
    "participant_id": "P14",
    "role": "UX Researcher",
    "response": "I'm spending more time writing reports that nobody reads than actually doing research. I've been experimenting with shorter formats, like a one-page brief, and that gets more engagement."
  },
  {
    "participant_id": "P15",
    "role": "Product Manager",
    "response": "Our design system has made things more consistent but it's also made some teams less willing to question patterns that don't actually work for their users. Convention becomes a crutch."
  },
  {
    "participant_id": "P16",
    "role": "UX Designer",
    "response": "I've started including a confidence rating in my recommendations, like this is high confidence from multiple sources versus this is directional from a single session. It's changed how people receive the findings."
  },
  {
    "participant_id": "P17",
    "role": "UX Researcher",
    "response": "Accessibility keeps getting treated as a compliance checklist instead of a design constraint. I've had the most success when I can get an assistive technology user into a session early because seeing it is harder to argue with than reading about it."
  },
  {
    "participant_id": "P18",
    "role": "Content Strategist",
    "response": "Error messages are the last thing anyone thinks about and the first thing users notice when something goes wrong. I've been trying to get them into scope earlier but they always end up being a handoff item."
  },
  {
    "participant_id": "P19",
    "role": "UX Designer",
    "response": "I struggle with knowing when I have enough data. There's always pressure to do one more round but at some point you're validating what you already know."
  },
  {
    "participant_id": "P20",
    "role": "Product Manager",
    "response": "The most useful thing research has done for us is help us stop building things. We killed two features last quarter based on findings and that felt like a win even though it's hard to show in a metric."
  },
  {
    "participant_id": "P21",
    "role": "UX Researcher",
    "response": "We've been using AI to help with transcript analysis and it speeds things up but I always do a pass myself because it flattens nuance. It's good at finding patterns and bad at knowing which ones matter."
  },
  {
    "participant_id": "P22",
    "role": "UX Designer",
    "response": "Onboarding is where our product falls apart and everyone knows it but there's no owner. Product thinks it's design, design thinks it's content, content thinks it's engineering. The user just bounces."
  },
  {
    "participant_id": "P23",
    "role": "Content Strategist",
    "response": "I've been pushing for a terminology audit across the product for two years. Different parts of the app use different words for the same thing and users notice even if they can't articulate why."
  },
  {
    "participant_id": "P24",
    "role": "UX Researcher",
    "response": "The best sessions I run are the ones where I say almost nothing. The worst are when I'm trying to cover too many topics and I end up steering instead of listening."
  },
  {
    "participant_id": "P25",
    "role": "Product Manager",
    "response": "We did a diary study last year and the data was incredible but we've never had the budget or time to do another one. I think longitudinal research is undersold in product teams."
  }
]
  </script>
  <script>
    const ROLE_COLORS = ["var(--bar-1)", "var(--bar-2)", "var(--bar-3)", "var(--bar-4)"];

    function wordCount(text) {
      return text.trim() ? text.trim().split(/\s+/).length : 0;
    }

    const raw = document.getElementById("survey-data").textContent;
    const rows = JSON.parse(raw).map((r) => ({
      ...r,
      words: wordCount(r.response || ""),
    }));

    const statsEl = document.getElementById("stats");
    const counts = rows.map((r) => r.words);
    const total = rows.length;
    const avg = total ? (counts.reduce((a, b) => a + b, 0) / total).toFixed(1) : "0";
    const min = total ? Math.min(...counts) : 0;
    const max = total ? Math.max(...counts) : 0;

    function statCard(label, value) {
      const d = document.createElement("div");
      d.className = "stat";
      d.innerHTML = '<div class="label"></div><div class="value"></div>';
      d.querySelector(".label").textContent = label;
      d.querySelector(".value").textContent = value;
      return d;
    }
    statsEl.append(
      statCard("Total responses", String(total)),
      statCard("Average words", avg),
      statCard("Shortest", String(min)),
      statCard("Longest", String(max)),
    );

    const byRole = {};
    for (const r of rows) {
      byRole[r.role] = (byRole[r.role] || 0) + 1;
    }
    const roleEntries = Object.entries(byRole).sort((a, b) => b[1] - a[1]);
    const maxRole = Math.max(...roleEntries.map(([, n]) => n), 1);
    const roleChart = document.getElementById("role-chart");
    roleEntries.forEach(([name, n], i) => {
      const row = document.createElement("div");
      row.className = "role-row";
      const pct = (n / maxRole) * 100;
      row.innerHTML =
        '<span class="role-name"></span>' +
        '<div class="role-track"><div class="role-fill"></div></div>' +
        '<span class="role-count"></span>';
      row.querySelector(".role-name").textContent = name;
      row.querySelector(".role-count").textContent = String(n);
      const fill = row.querySelector(".role-fill");
      fill.style.width = pct + "%";
      fill.style.background = ROLE_COLORS[i % ROLE_COLORS.length];
      roleChart.appendChild(row);
    });

    const maxWc = Math.max(...counts, 1);
    const wcChart = document.getElementById("wc-chart");
    rows.forEach((r) => {
      const row = document.createElement("div");
      row.className = "wc-row";
      const pct = (r.words / maxWc) * 100;
      row.innerHTML =
        '<span class="wc-id"></span>' +
        '<div class="wc-track"><div class="wc-fill" style="width:' + pct + '%"></div></div>' +
        '<span class="wc-num"></span>';
      row.querySelector(".wc-id").textContent = r.participant_id;
      row.querySelector(".wc-num").textContent = String(r.words);
      wcChart.appendChild(row);
    });

    const roles = ["All roles", ...[...new Set(rows.map((r) => r.role))].sort()];
    const filterEl = document.getElementById("filter-role");
    roles.forEach((role) => {
      const o = document.createElement("option");
      o.value = role === "All roles" ? "" : role;
      o.textContent = role;
      filterEl.appendChild(o);
    });

    const tbody = document.getElementById("tbody");
    const empty = document.getElementById("empty");
    const searchEl = document.getElementById("search");

    function render() {
      const roleF = filterEl.value;
      const q = searchEl.value.trim().toLowerCase();
      tbody.replaceChildren();
      let shown = 0;
      for (const r of rows) {
        if (roleF && r.role !== roleF) continue;
        if (q && !(r.response || "").toLowerCase().includes(q) && !(r.participant_id || "").toLowerCase().includes(q) && !(r.role || "").toLowerCase().includes(q)) continue;
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td class='cell-id'></td>" +
          "<td class='cell-role'></td>" +
          "<td class='cell-meta'></td>" +
          "<td class='cell-response'></td>";
        tr.querySelector(".cell-id").textContent = r.participant_id;
        tr.querySelector(".cell-role").textContent = r.role;
        tr.querySelector(".cell-meta").textContent = r.words;
        tr.querySelector(".cell-response").textContent = r.response;
        tbody.appendChild(tr);
        shown++;
      }
      empty.hidden = shown > 0;
      empty.style.display = shown ? "none" : "block";
    }

    filterEl.addEventListener("change", render);
    searchEl.addEventListener("input", render);
    render();
  </script>
</body>
</html>
